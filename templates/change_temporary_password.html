{% extends g.base_template %}
{% block title %}Смена временного пароля{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Смена временного пароля</h1>
</div>

<div class="card" style="max-width:560px; margin:0 auto;">
    <div class="card-header">Необходимо установить новый пароль</div>
    <div class="card-body">
        <p class="text-muted" style="margin-top:0;">
            Вы вошли с временным паролем. Перед началом работы установите новый постоянный пароль.
        </p>
        <form method="post" action="{{ url_for('sec003a_change_temp_password') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Логин</label>
                <input type="text" value="{{ current_user.username }}" disabled style="background:var(--surface2);">
            </div>
            <div class="form-group">
                <label>Новый пароль</label>
                <input type="password" name="new_password" required minlength="8" autocomplete="new-password" placeholder="Минимум 8 символов">
            </div>
            <div class="form-group">
                <label>Повторите новый пароль</label>
                <input type="password" name="confirm_password" required minlength="8" autocomplete="new-password" placeholder="Повторите пароль">
            </div>
            <button type="submit" class="btn btn-primary">Сохранить новый пароль</button>
        </form>
    </div>
</div>
{% endblock %}
